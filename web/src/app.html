<!doctype html>
<html lang="zh-CN">
	<head>
		<meta charset="utf-8" />
		<!-- viewport-fit=cover：iOS 刘海屏安全区 env(safe-area-inset-*) 生效的前提 -->
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="text-scale" content="scale" />
		<!-- 与 app.css tokens --bg 同值（meta 无法引用 CSS 变量） -->
		<meta name="theme-color" media="(prefers-color-scheme: light)" content="#FAF6EF" />
		<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#171412" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
