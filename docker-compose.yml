services:
  mysql:
    image: mysql:8.4
    ports:
      - "${PIAOJU_MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-piaoju}
      MYSQL_USER: ${MYSQL_USER:-piaoju}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-piaoju}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - ./data/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpass}"]
      interval: 5s
      timeout: 3s
      retries: 12

  # S1 提供 server/Dockerfile 后启用：docker compose --profile full up -d
  api:
    profiles: ["full"]
    build: ./server
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      PIAOJU_DB_DSN: ${MYSQL_USER:-piaoju}:${MYSQL_PASSWORD:-piaoju}@tcp(mysql:3306)/${MYSQL_DATABASE:-piaoju}?parseTime=true&loc=UTC&charset=utf8mb4
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
